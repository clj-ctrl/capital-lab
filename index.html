  "Sensitivity Without Excel: What Actually Moves the Needle": {
    content: `
<h2>Why This Matters</h2>
<p>Every PE analyst can run a sensitivity table in Excel. The question firms like Blackstone ask is: do you know, before you open the model, which assumptions will matter most? Can you rank the return drivers without running a thousand scenarios? This intuition — which variable has the biggest impact on IRR — separates analysts who understand deal economics from analysts who operate models.</p>

<h2>The Four Return Drivers</h2>
<p>In any LBO, returns come from four variables:</p>
<ul>
<li><strong>Entry multiple</strong> — what you paid</li>
<li><strong>Exit multiple</strong> — what you sold for</li>
<li><strong>EBITDA growth</strong> — how much better the business performed</li>
<li><strong>Leverage</strong> — how much debt amplified equity returns</li>
</ul>
<p>The intuitive answer to "which matters most" is usually wrong. Most people say EBITDA growth. The actual answer is context-dependent — and knowing why reveals genuine understanding.</p>

<h2>Entry Multiple: The Biggest Risk, Not the Biggest Return Driver</h2>
<p>Entry multiple is the most important variable for <em>downside protection</em>. Overpaying at entry creates a structural handicap that operating performance rarely overcomes. But entry multiple sensitivity to IRR is roughly symmetrical — a 1x improvement in entry multiple (from 9x to 8x on a $40M EBITDA business) reduces the equity check by $40M, which has a significant but bounded impact on IRR.</p>
<p>In a $340M purchase with $140M equity: reducing entry from 8.5x to 7.5x means purchase price drops to $300M, equity drops to $100M, and the same exit generates 4.6x EM vs 3.3x EM — a massive swing. <strong>Entry multiple is the most IRR-sensitive variable in high-leverage deals.</strong></p>

<h2>Exit Multiple: The Biggest Upside Driver</h2>
<p>Exit multiple expansion adds value directly and is multiplied by the entire exit EBITDA base. A 1x improvement in exit multiple on $64M exit EBITDA = $64M more in equity value. On $140M initial equity, that's a 46% return boost. Multiple expansion from 8x to 9x at exit is worth more in dollar terms than 10% EBITDA outperformance.</p>

<h2>EBITDA Growth: The Most Reliable and Most Controllable</h2>
<p>EBITDA growth is the only return driver the PE firm can actually influence directly. Entry and exit multiples are set by markets. Leverage is set by lenders. EBITDA growth comes from strategy, operations, management, and execution. For this reason, despite not being the highest-leverage return driver arithmetically, it is the one PE firms spend the most time on pre-investment — because it's the one they can actually control.</p>

<h2>Leverage: Amplifier, Not Creator</h2>
<p>Leverage magnifies returns on the way up — but it also magnifies losses on the way down and creates fixed obligations that must be met regardless of performance. Beyond a certain point, more leverage adds more risk than it adds return. The "optimal" leverage point is where the marginal return on additional debt exceeds the marginal risk of distress.</p>

<div class="callout"><strong>The practitioner's ranking (for a typical PE deal):</strong> Entry multiple sensitivity > Exit multiple sensitivity > Leverage sensitivity > EBITDA growth sensitivity on a pure mathematical basis. But from a "what can I actually control" basis: EBITDA growth > leverage negotiation > exit timing > entry discipline. These two rankings tell different stories — and both are true.</div>

<h2>Quick Sensitivity Mental Math</h2>
<p>Base case: 3.3x EM in 5 years ≈ 27% IRR. What does each variable do?</p>
<p>Entry multiple +1x (worse): equity check increases $40M → 3.3x drops to ~2.9x → IRR drops to ~24%.</p>
<p>Exit multiple +1x (better): equity proceeds increase $64M → 3.3x rises to ~3.8x → IRR rises to ~31%.</p>
<p>EBITDA growth -2% per year (5yr compounding): exit EBITDA drops from $64M to $57M → equity proceeds fall $63M → 3.3x drops to ~2.8x → IRR ~23%.</p>
<p>Leverage -1x (less debt): equity check increases $40M → EM drops to ~2.9x → IRR ~24%.</p>`,
    quiz: [
      { q: "In a standard PE deal, which variable change produces the largest IRR impact: (a) entry multiple decreases by 1x, or (b) EBITDA growth increases by 3% per year for 5 years?", opts: ["A) EBITDA growth — compounding makes it dominant", "B) Entry multiple — it directly reduces equity check while exit proceeds remain the same, creating a higher percentage return on less capital", "C) They are mathematically identical", "D) Depends on the leverage level"], correct: 1, exp: "On a $40M EBITDA deal: a 1x reduction in entry multiple reduces the equity check by $40M (from, say, $140M to $100M). The exit proceeds remain unchanged. This drives a massive improvement in EM. A 3% EBITDA growth improvement over 5 years adds roughly $8M to exit EBITDA — meaningful, but worth less than $40M in equity check reduction. Entry multiple is more IRR-sensitive in leveraged structures." },
      { q: "Exit multiple expands from 8x to 10x on a deal with $60M exit EBITDA and $80M remaining debt. Initial equity was $100M. What is the additional equity value created by the 2x multiple expansion?", opts: ["A) $60M", "B) $90M", "C) $120M", "D) $80M"], correct: 2, exp: "At 8x: exit value = $480M. Equity proceeds = $480M - $80M = $400M. EM = 4.0x. At 10x: exit value = $600M. Equity proceeds = $600M - $80M = $520M. EM = 5.2x. Additional equity value = $520M - $400M = $120M. Each 1x of multiple expansion on $60M exit EBITDA = $60M of additional equity value." },
      { q: "A PE deal has the following base case: 3.5x EM in 5 years. EBITDA underperforms by 15% below projection. Approximate the new equity multiple (rough mental math).", opts: ["A) ~2.9x", "B) ~3.0x", "C) ~2.7x", "D) ~3.1x"], correct: 0, exp: "A 15% EBITDA miss reduces exit EBITDA by 15%. Exit value falls by 15% × exit multiple. If exit value was, say, $500M, it's now ~$425M. Equity proceeds fall roughly proportionally. From 3.5x: a 15-18% reduction in equity proceeds → roughly 2.9-3.0x EM. The exact answer depends on leverage, but the rough math puts it around 2.9x. EBITDA misses compound through the exit multiple — the impact is larger than the raw % miss." },

    { term: "Preferred Return", def: "The minimum annual return rate the LP must receive (on their invested capital) before the GP earns any promoted share of profits. Most commonly 8% in U.S. real estate.", note: "Example: $10M LP × 8% = $800K/year. On a 4-year development with no distributions, $3.2M accrues before any promote." },
    { term: "Cumulative Preferred Return", def: "A preferred return structure where unpaid amounts carry forward and compound. LP must receive all accrued pref before GP earns promote.", note: "In a development deal with 3 years of no distributions, a cumulative 8% pref accrues $2.4M per $10M of LP equity — which must be paid at exit before any promote." },
    { term: "Non-Cumulative Preferred Return", def: "A preferred return where unpaid amounts from prior periods are forfeited. Only current-period distributions are tested against the threshold.", note: "Non-cumulative favors the GP. In a development deal with no early distributions, the LP's pref simply doesn't accrue — making the LP's protection largely illusory." },
    { term: "Promote / Carried Interest", def: "The GP's disproportionate share of profits above the return hurdle. Typically 15–25%. The GP's primary economic incentive beyond fee income.", note: "Promote is back-end loaded — on a 5-year development, the GP may not see promote until year 6 or 7. Model the GP's all-in IRR on their co-invest + promote." },
    { term: "IRR Hurdle", def: "The minimum IRR threshold the LP must achieve before the GP earns promote at a higher tier. Creates a stepped promote structure tied to deal performance.", note: "A 12% IRR hurdle means the LP must receive capital back plus returns equivalent to a 12% annual return before the GP earns promote." },
    { term: "Catch-Up Provision", def: "After the LP's preferred return is fully paid, the catch-up allows the GP to receive a disproportionate share of distributions until they've received their full promoted percentage of all profits.", note: "A 100% GP catch-up means after the LP's pref is paid, 100% goes to GP until they've received 20% of all cumulative profits. Then distributions revert to 80/20." },
    { term: "Clawback", def: "A provision requiring the GP to return previously distributed promote if total LP returns ultimately fall below the agreed threshold. Protects LPs in deals with multiple assets or early distributions.", note: "Critical in fund structures with multiple properties. GPs should reserve against clawback risk — returning promote capital years later is a real obligation." },
    { term: "Pari Passu", def: "Latin for 'equal step.' Describes distributions made proportionally and simultaneously to multiple parties without any preference between them.", note: "In return of capital, LP and GP typically receive capital back pari passu (in proportion to their respective investments). Once the pref kicks in, they're no longer pari passu." },
    { term: "Distribution Waterfall", def: "The contractually defined sequence in which cash flows are distributed to partners. Each tier must be fully satisfied before distributions flow to the next.", note: "Standard sequence: return of capital → preferred return → catch-up → promoted split. Variations are infinite — always read the full operating agreement." },
    { term: "Return of Capital", def: "The first tier of most waterfalls — the LP and GP receive back their invested equity contributions before any profit-sharing begins.", note: "RoC is typically pro-rata (proportional to ownership). Some deals separate LP and GP capital return timing — read carefully." }
  ],
  underwriting: [
    { term: "IRR (Internal Rate of Return)", def: "The discount rate at which the NPV of all cash flows equals zero. Measures the annualized time-weighted return on equity invested in a deal.", note: "Common mistake: confusing a high IRR with a good deal. A 25% IRR on a 12-month flip and a 15% IRR on a 7-year development are fundamentally different risk profiles." },
    { term: "Equity Multiple", def: "Total distributions received by the investor divided by total equity invested. Measures the magnitude of return independent of timing.", note: "Common mistake: using EM alone without considering IRR. A 2.0x EM in 2 years (≈41% IRR) is dramatically better than 2.0x in 8 years (≈9% IRR)." },
    { term: "Cash-on-Cash Return", def: "Annual cash distributions divided by equity invested. Measures current income yield on an equity investment in a stabilized property.", note: "Common mistake: applying CoC to development deals. CoC is near zero during construction and lease-up. Use IRR and EM for development; CoC for stabilized income plays." },
    { term: "DSCR (Debt Service Coverage Ratio)", def: "NOI divided by annual debt service. Measures the property's ability to cover loan payments from operations. The lender's primary performance covenant.", note: "Common mistake: using projected NOI without applying lender stress (typically 85-90% of projection). Always model DSCR at the stressed NOI lenders will underwrite to." },
    { term: "Yield on Cost", def: "Stabilized NOI divided by total development cost. Tells the developer whether the project creates value relative to what a buyer would pay for a stabilized equivalent.", note: "Common mistake: using a comp set cap rate that doesn't match the asset's true risk profile. Using a 6% cap from a stabilized comp to validate a $4M NOI on an unproven new development overstates value creation." },
    { term: "Cap Rate", def: "The ratio of stabilized NOI to property value. Represents the market's required current yield for a given asset type, quality, and location.", note: "Common mistake: using current-year NOI (during lease-up) to value an asset rather than stabilized NOI. This systematically understates value during lease-up and overstates during periods of above-normal performance." },
    { term: "NOI (Net Operating Income)", def: "Gross revenue minus operating expenses, before debt service, depreciation, and capital expenditures. The fundamental measure of a real estate asset's income-producing capacity.", note: "Common mistake: excluding management fees or replacement reserves from operating expenses. A hotel management fee (3-5% of revenue) and replacement reserves (3-5% of revenue) can represent $500K–$1M+ annually that must be in NOI." },
    { term: "LTV (Loan-to-Value)", def: "Loan amount divided by the stabilized appraised value. Measures the lender's downside protection at maturity or exit.", note: "Common mistake: confusing LTC and LTV. LTC measures risk during construction; LTV measures risk at stabilization. A deal with conservative LTC can still have risky LTV if development costs exceed market value." },
    { term: "LTC (Loan-to-Cost)", def: "Loan amount divided by total project cost. The primary metric for sizing construction loans and determining equity required.", note: "Common mistake: excluding soft costs, interest reserves, and carry from the total project cost denominator. This overstates LTC and understates true equity requirements." },
    { term: "Sensitivity Analysis", def: "A technique for measuring how changes in a single input variable (holding all others constant) affect the output metric (IRR, EM, or DSCR).", note: "Common mistake: building sensitivity analysis only around the base case. LPs underwrite to downside scenarios. Always build a sensitivity table around the downside case as well as base." }
  ]
};

// ─── STATE ─────────────────────────────────────────────────────────────────────
let currentMod = 0;
let currentTopic = null;
let quizState = null;
let completedTopics = new Set();
let currentScenarioDiff = 'intro';
let currentScenarioType = 'hotel';
let currentScenarioLoaded = false;

// ─── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ─── MODULES & TOPICS ─────────────────────────────────────────────────────────
function selectMod(idx, btn) {
  currentMod = idx;
  document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTopics();
}

function renderTopics() {
  const mod = MODULES[currentMod];
  document.getElementById('topic-section-label').textContent = mod.label + ' — choose a topic';
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = mod.topics.map((t, i) => {
    const isDone = completedTopics.has(t);
    const hasLesson = !!LESSONS[t];
    return `<button class="topic-btn${isDone ? ' done' : ''}" data-mod="${currentMod}" data-idx="${i}" ${!hasLesson ? 'style="opacity:0.5"' : ''}>
      <span>${t}</span><span class="t-arr">→</span>
    </button>`;
  }).join('');
  grid.querySelectorAll('.topic-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const mod = parseInt(this.dataset.mod);
      const idx = parseInt(this.dataset.idx);
      openLesson(MODULES[mod].topics[idx]);
    });
  });
}

// ─── LESSONS ──────────────────────────────────────────────────────────────────
function openLesson(topic) {
  const lesson = LESSONS[topic];
  if (!lesson) return;
  currentTopic = topic;
  quizState = null;

  document.getElementById('lessons-home').style.display = 'none';
  document.getElementById('lesson-view').classList.add('active');
  document.getElementById('lesson-title').textContent = topic;
  document.getElementById('lesson-body').innerHTML = lesson.content;
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('prog-label').textContent = 'Lesson loaded';
  document.getElementById('prog-pct').textContent = 'Step 1 of 3';
  document.getElementById('prog-fill').style.width = '33%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeLesson() {
  document.getElementById('lesson-view').classList.remove('active');
  document.getElementById('lessons-home').style.display = 'block';
}

function showQuiz() {
  const lesson = LESSONS[currentTopic];
  if (!lesson) return;

  quizState = { questions: lesson.quiz, idx: 0, score: 0, answered: null, done: false };
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('prog-label').textContent = 'Quiz in progress';
  document.getElementById('prog-pct').textContent = 'Step 2 of 3';
  document.getElementById('prog-fill').style.width = '66%';
  renderQuizQuestion();
  document.getElementById('quiz-area').scrollIntoView({ behavior: 'smooth' });
}

function renderQuizQuestion() {
  const qs = quizState;
  const section = document.getElementById('quiz-section');

  if (qs.done) {
    const pct = Math.round(qs.score / qs.questions.length * 100);
    const msg = pct === 100 ? 'Perfect — exceptional.' : pct >= 75 ? 'Strong grasp.' : pct >= 50 ? 'Review the lesson and retry.' : 'Re-read the lesson before retrying.';
    section.innerHTML = `
      <div class="score-box">
        <div class="score-num">${qs.score}/${qs.questions.length}</div>
        <div class="score-msg">${pct}% — ${msg}</div>
      </div>
      <div class="action-row">
        <button class="btn-primary" onclick="retakeQuiz()">Retake quiz</button>
        <button class="btn-sec" onclick="closeLesson()">← Choose another topic</button>
      </div>`;
    document.getElementById('prog-label').textContent = 'Complete';
    document.getElementById('prog-pct').textContent = 'Step 3 of 3';
    document.getElementById('prog-fill').style.width = '100%';
    completedTopics.add(currentTopic);
    renderTopics();
    return;
  }

  const q = qs.questions[qs.idx];
  const letters = ['A','B','C','D'];
  const optsHtml = q.opts.map((opt, i) => {
    let cls = 'quiz-opt';
    if (qs.answered !== null) {
      cls += ' locked';
      if (i === q.correct) cls += ' correct';
      else if (i === qs.answered && i !== q.correct) cls += ' wrong';
    }
    return `<div class="${cls}" onclick="answerQuiz(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span>${opt.replace(/^[A-D]\)\s*/, '')}</span>
    </div>`;
  }).join('');

  const expHtml = qs.answered !== null ? `
    <div class="quiz-exp">
      <strong style="color:${qs.answered === q.correct ? 'var(--green)' : 'var(--red)'}">${qs.answered === q.correct ? '✓ Correct.' : '✗ Not quite.'}</strong>
      ${q.exp}
    </div>` : '';

  const nextHtml = qs.answered !== null ? `
    <div class="action-row" style="margin-top:12px">
      <button class="btn-primary" onclick="nextQuestion()">${qs.idx + 1 < qs.questions.length ? 'Next question →' : 'See results →'}</button>
    </div>` : '';

  section.innerHTML = `
    <div class="quiz-meta">Question ${qs.idx + 1} of ${qs.questions.length} · Score: ${qs.score}</div>
    <div class="quiz-hdr">${q.q}</div>
    <div class="quiz-opts">${optsHtml}</div>
    ${expHtml}${nextHtml}`;
}

function answerQuiz(i) {
  if (quizState.answered !== null) return;
  quizState.answered = i;
  if (i === quizState.questions[quizState.idx].correct) quizState.score++;
  renderQuizQuestion();
}

function nextQuestion() {
  quizState.idx++;
  quizState.answered = null;
  if (quizState.idx >= quizState.questions.length) quizState.done = true;
  renderQuizQuestion();
}

function retakeQuiz() {
  quizState = { questions: LESSONS[currentTopic].quiz, idx: 0, score: 0, answered: null, done: false };
  renderQuizQuestion();
}

// ─── SCENARIOS ─────────────────────────────────────────────────────────────────
let activeScenario = null;
let challengeStep = 0;

function setDiff(diff, btn) {
  currentScenarioDiff = diff;
  document.querySelectorAll('.diff-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function loadScenario() {
  currentScenarioType = document.getElementById('sc-type').value;
  const scData = SCENARIOS[currentScenarioType];
  if (!scData) {
    document.getElementById('scenario-output').innerHTML = `<div class="scenario-box"><p>Scenario coming soon. Try Hotel.</p></div>`;
    return;
  }
  const diff = currentScenarioDiff === 'senior' ? 'senior' : currentScenarioDiff === 'mid' ? 'mid' : 'intro';
  activeScenario = scData[diff] || scData['mid'] || scData['intro'];

  document.getElementById('scenario-output').innerHTML = `
    <div class="scenario-box">${activeScenario.html}</div>
    <hr style="border:none;border-top:1px solid var(--border);margin:20px 0">
    <div class="sec-lbl">How do you want to work through this deal?</div>
    <div class="sc-path-choice">
      <button class="sc-path-btn" id="path-explain">
        <div class="sc-path-tag">Explainer mode</div>
        <div class="sc-path-title">Explain it to me</div>
        <div class="sc-path-sub">Walk me through waterfall, lender risk, stress test, and promote mechanics</div>
      </button>
      <button class="sc-path-btn" id="path-work">
        <div class="sc-path-tag">Active mode</div>
        <div class="sc-path-title">Let me work through it</div>
        <div class="sc-path-sub">Four interactive challenges: spot, fill, decide, and build</div>
      </button>
    </div>
    <div id="path-content"></div>`;

  document.getElementById('path-explain').addEventListener('click', () => showExplainerMode());
  document.getElementById('path-work').addEventListener('click', () => showChallengeMode());
}

function showExplainerMode() {
  document.getElementById('path-explain').style.background = 'var(--deep)';
  document.getElementById('path-explain').querySelectorAll('.sc-path-title,.sc-path-sub,.sc-path-tag').forEach(el => el.style.color = 'var(--paper)');
  document.getElementById('path-work').style.background = '';
  document.getElementById('path-work').querySelectorAll('.sc-path-title,.sc-path-sub').forEach(el => el.style.color = '');

  const sc = activeScenario;
  const qaKeys = Object.keys(sc.qa);
  const qaButtons = qaKeys.map((k, i) => `<button class="qa-btn" data-qi="${i}">${k} →</button>`).join('');
  document.getElementById('path-content').innerHTML = `
    <div class="sec-lbl" style="margin-top:4px">Choose a question</div>
    <div class="qa-btn-grid">${qaButtons}</div>
    <div id="qa-answer-box"></div>`;

  document.querySelectorAll('.qa-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const key = qaKeys[parseInt(this.dataset.qi)];
      document.querySelectorAll('.qa-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('qa-answer-box').innerHTML = `
        <div class="sec-lbl" style="margin-top:16px">${key}</div>
        <div class="qa-answer">${activeScenario.qa[key]}</div>`;
      document.getElementById('qa-answer-box').scrollIntoView({ behavior: 'smooth' });
    });
  });
}

function showChallengeMode() {
  document.getElementById('path-work').style.background = 'var(--deep)';
  document.getElementById('path-work').querySelectorAll('.sc-path-title,.sc-path-sub,.sc-path-tag').forEach(el => el.style.color = 'var(--paper)');
  document.getElementById('path-explain').style.background = '';
  document.getElementById('path-explain').querySelectorAll('.sc-path-title,.sc-path-sub').forEach(el => el.style.color = '');
  challengeStep = 0;
  renderChallenge();
}

function renderChallenge() {
  const sc = activeScenario;
  const challenges = sc.challenges;
  const c = challenges[challengeStep];
  const total = challenges.length;

  const dots = challenges.map((_, i) => `<div class="c-step-dot${i === challengeStep ? ' active' : i < challengeStep ? ' done' : ''}"></div>`).join('');

  document.getElementById('path-content').innerHTML = `
    <div class="challenge-wrap">
      <div class="challenge-hdr">
        <div class="challenge-tag">${c.type}</div>
        <div class="challenge-title">${c.title}</div>
      </div>
      <div class="challenge-body" id="challenge-body">${c.render()}</div>
      <div class="c-step-nav">
        <div class="c-step-dots">${dots}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">${challengeStep + 1} / ${total}</div>
      </div>
    </div>`;

  if (c.init) c.init();
}

function nextChallenge() {
  challengeStep++;
  if (challengeStep < activeScenario.challenges.length) {
    renderChallenge();
    document.getElementById('path-content').scrollIntoView({ behavior: 'smooth' });
  } else {
    document.getElementById('path-content').innerHTML += `
      <div class="content-box" style="margin-top:12px;text-align:center">
        <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:8px">All four challenges complete.</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:20px">You have analysed this deal from every angle. Try the Senior difficulty for a more complex version.</div>
        <button class="btn-primary" onclick="loadScenario()">Generate a new scenario →</button>
      </div>`;
  }
}

function revealAnswer(id) {
  const el = document.getElementById(id);
  if (el) { el.classList.add('show'); }
  const btn = document.querySelector('[onclick="revealAnswer(\'' + id + '\')"]');
  if (btn) btn.style.display = 'none';
}

function checkBlanks(id, answers, nextLabel) {
  const table = document.getElementById(id);
  const inputs = table.querySelectorAll('.c-input');
  let correct = 0;

  inputs.forEach((inp, i) => {
    inp.disabled = true;
    const ans = answers[i];
    if (!ans) return;
    // Extract numeric value from both user input and correct answer for loose comparison
    const userNum = parseFloat(inp.value.replace(/[^0-9.-]/g, ''));
    const correctNum = parseFloat(ans.val.replace(/[^0-9.-]/g, ''));
    const isCorrect = !isNaN(userNum) && !isNaN(correctNum) && Math.abs(userNum - correctNum) / correctNum < 0.05;
    inp.style.borderColor = isCorrect ? 'var(--green)' : 'var(--red)';
    inp.style.background = isCorrect ? 'var(--green-bg)' : 'var(--red-bg)';
    if (isCorrect) correct++;
  });

  let html = `<div class="c-reveal show" style="margin-top:14px"><strong>${correct}/${answers.length} correct.</strong> Full answers:<br><br>`;
  answers.forEach(a => { html += `<strong>${a.label}:</strong> ${a.val}<br>`; });
  html += `</div><div class="action-row" style="margin-top:14px"><button class="btn-primary" onclick="nextChallenge()">${nextLabel || 'Next challenge →'}</button></div>`;
  table.closest('.challenge-body').insertAdjacentHTML('beforeend', html);
}

function pickDecision(chosen, options, revealId) {
  document.querySelectorAll('.c-decision-btn').forEach(b => b.classList.add('locked'));
  options.forEach((opt, i) => {
    const btn = document.querySelectorAll('.c-decision-btn')[i];
    if (i === chosen) {
      btn.classList.add(opt.good ? 'chosen-good' : 'chosen-bad');
    }
  });
  document.getElementById(revealId).classList.add('show');
  setTimeout(() => {
    const body = document.getElementById('challenge-body');
    body.innerHTML += `<div class="action-row" style="margin-top:14px"><button class="btn-primary" onclick="nextChallenge()">Next challenge →</button></div>`;
  }, 100);
}


// ─── GLOSSARY ──────────────────────────────────────────────────────────────────
function showGloss(key) {
  document.querySelectorAll('.gloss-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.gloss-btns button').forEach(b => { b.className = 'btn-sec'; });
  document.getElementById('gloss-' + key).classList.add('active');
  event.currentTarget.className = 'btn-primary';

  const section = document.getElementById('gloss-' + key);
  if (section.innerHTML.trim() === '') {
    const items = GLOSSARY_DATA[key];
    section.innerHTML = items.map(item => `
      <div class="gloss-item">
        <div class="gloss-term">${item.term}</div>
        <div class="gloss-def">${item.def}</div>
        <div class="gloss-note">→ ${item.note}</div>
      </div>`).join('');
  }
}

// Init
renderTopics();
showGloss('formulas');
</script>
