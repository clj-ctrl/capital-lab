  "Cap Rate & NOI — Building the Income Approach": {
    content: `
<h2>Why This Matters</h2>
<p>The income approach is how nearly all commercial real estate is valued. At its core: the value of an income-producing asset is a function of the income it generates and the rate of return the market requires. Mastering this relationship — and its nuances — is foundational to every acquisition, development, and financing decision.</p>
<h2>Net Operating Income (NOI)</h2>
<p>NOI is the property's income after all operating expenses but before debt service, depreciation, and income taxes. It is the numerator in every valuation and DSCR calculation.</p>
<div class="formula">NOI = Effective Gross Revenue − Operating Expenses<br><br>EGR = Potential Gross Revenue − Vacancy & Credit Loss<br>OpEx = Management + Labor + Utilities + Insurance + Property Tax + Reserves for Replacement</div>
<p><strong>Critical item:</strong> Capital expenditures (CapEx) are NOT in NOI for valuation purposes. But lenders and buyers underwrite a "replacement reserve" (typically 3–5% of gross revenue for hotels) as an operating expense, which does reduce NOI. Know whether you're looking at NOI before or after reserves.</p>
<h2>Capitalization Rate</h2>
<p>The cap rate is the market's required yield on a stabilized real estate asset — effectively the going-in return a buyer demands.</p>
<div class="formula">Cap Rate = NOI ÷ Value<br>Value = NOI ÷ Cap Rate</div>
<p>A 6.0% cap rate means buyers are paying 16.7× NOI (1/0.06). A 7.0% cap rate means buyers pay 14.3× NOI. Lower cap rates = higher values = more aggressive pricing = lower required yields = stronger market.</p>
<h2>Cap Rate Drivers</h2>
<ul>
<li><strong>Asset quality:</strong> Trophy luxury assets command lower (tighter) cap rates. Limited-service suburban hotels have higher cap rates.</li>
<li><strong>Location:</strong> Primary markets (NYC, LA, Miami) have tighter caps than secondary/tertiary markets.</li>
<li><strong>Brand affiliation:</strong> Branded assets with strong management contracts command a cap rate premium (lower rate) vs. unaffiliated independent hotels.</li>
<li><strong>Interest rates:</strong> Cap rates are correlated with the risk-free rate (10-year Treasury). Rising rates generally push cap rates higher (lower values).</li>
</ul>
<h2>What Practitioners Know</h2>
<ul>
<li><strong>Going-in cap rate vs. exit cap rate.</strong> The going-in cap is what you're buying/building at. The exit cap is your assumption for what the next buyer will pay. A 25bps exit cap expansion on $4M NOI destroys $1.7M of value. Always stress-test your exit cap assumption.</li>
<li><strong>Stabilized NOI is not Year 1 NOI.</strong> A development project's Year 1 NOI during lease-up will be well below stabilized NOI. Value the asset on stabilized NOI, then discount back for the lease-up period. Using Year 1 NOI overstates value and understates risk.</li>
<li><strong>NOI quality matters.</strong> $4M NOI from a long-term branded management contract is worth more (lower cap rate) than $4M from a short-term lease with an unproven operator. Buyers and lenders haircut NOI quality.</li>
</ul>
<div class="callout"><strong>Luxury Context:</strong> Luxury branded residences are valued differently from hotel rooms — typically on a per-unit comparable sale basis, not income capitalization. However, the hotel component of a mixed-use development is still valued via the income approach. The interaction between hotel NOI and branded residence sale proceeds creates a complex valuation where you cannot simply cap the combined cash flows. Model them separately.</div>`,
    quiz: [
      { q: "A hotel generates $5.5M gross revenue. Vacancy/credit loss is 5%. Operating expenses are 52% of EGR. What is the NOI?", opts: ["A) $2.49M", "B) $2.64M", "C) $2.31M", "D) $2.78M"], correct: 0, exp: "EGR = $5.5M × (1−5%) = $5.225M. Operating expenses = $5.225M × 52% = $2.717M. NOI = $5.225M − $2.717M = $2.508M ≈ $2.49M. Work through the steps: gross → EGR → NOI." },
      { q: "NOI is $3.8M. Market cap rates for comparable luxury hotels are 6.25%. What is the indicated value?", opts: ["A) $55.8M", "B) $60.8M", "C) $52.4M", "D) $63.2M"], correct: 1, exp: "Value = NOI ÷ Cap Rate = $3.8M ÷ 0.0625 = $60.8M. Always divide NOI by the cap rate. A common mistake is multiplying or using the wrong decimal. At 6.25%, each $1 of NOI is worth $16 (1/0.0625 = 16x)." },
      { q: "A developer projects Year 1 NOI of $2.1M, stabilized NOI of $3.4M. Cap rates are 6.5%. What mistake does a developer make by using Year 1 NOI to value the asset?", opts: ["A) No mistake — Year 1 NOI is the appropriate basis", "B) Overstates value by approximately $20M vs. stabilized NOI basis", "C) Understates value — stabilized NOI should be discounted", "D) Understates value by approximately $20M"], correct: 1, exp: "Year 1 value = $2.1M ÷ 6.5% = $32.3M. Stabilized value = $3.4M ÷ 6.5% = $52.3M. Using Year 1 NOI understates value (vs. stabilized). Using Year 1 to justify a loan or equity raise based on 'full value' would be the mistake — it overstates what the asset is worth today vs. at stabilization." },
      { q: "Exit cap rates expand 75bps (from 6.0% to 6.75%) at a hotel with $4.2M stabilized NOI. What is the value impact?", opts: ["A) −$7.8M", "B) −$6.2M", "C) −$5.8M", "D) −$9.1M"], correct: 0, exp: "Value at 6.0% = $4.2M ÷ 0.060 = $70.0M. Value at 6.75% = $4.2M ÷ 0.0675 = $62.2M. Value impact = $70.0M − $62.2M = −$7.8M. A 75bps cap rate expansion destroys $7.8M of value. This flows entirely to equity — making it the most material single variable in a development exit underwrite." }
    ]
  },

  "Sensitivity Analysis: Stress-Testing Assumptions": {
    content: `
<h2>Why This Matters</h2>
<p>Every real estate underwrite is a model of the future. Every assumption is wrong. Sensitivity analysis is how serious practitioners understand the range of outcomes and identify the variables that actually matter. LPs run it on every deal — if you can't answer sensitivity questions, you're not in the room.</p>
<h2>The Core Concept</h2>
<p>Sensitivity analysis tests how the output (usually IRR or equity multiple) changes when a single input variable changes, holding all other variables constant. You're measuring the "elasticity" of your return to each assumption.</p>
<p>The most critical inputs to stress in a hotel/resort development deal:</p>
<ol>
<li><strong>Exit cap rate</strong> (most impactful single variable in most deals)</li>
<li><strong>Stabilized NOI / RevPAR</strong> (often second most impactful)</li>
<li><strong>Construction cost overrun</strong> (affects LTC, equity required)</li>
<li><strong>Stabilization timeline</strong> (affects IRR via time value)</li>
<li><strong>Interest rate / cost of debt</strong> (affects carry during construction)</li>
</ol>
<h2>Building a Sensitivity Table</h2>
<p>A standard two-variable sensitivity table tests LP IRR across a range of two inputs simultaneously:</p>
<div class="table-wrap"><table>
<tr><th>NOI \ Exit Cap</th><th>5.50%</th><th>6.00%</th><th>6.50%</th><th>7.00%</th></tr>
<tr><td>$4.5M (+15%)</td><td>24.1%</td><td>21.2%</td><td>18.6%</td><td>16.3%</td></tr>
<tr><td>$3.9M (base)</td><td>20.3%</td><td>17.8%</td><td>15.5%</td><td>13.4%</td></tr>
<tr><td>$3.3M (−15%)</td><td>16.2%</td><td>13.9%</td><td>11.8%</td><td>9.9%</td></tr>
<tr><td>$2.7M (−30%)</td><td>11.8%</td><td>9.7%</td><td>7.8%</td><td>6.1%</td></tr>
</table></div>
<p>The base case (shaded) shows 17.8% LP IRR. A 15% NOI miss with 50bps cap rate expansion (one cell down, one right) drops IRR to 13.9% — still above a typical 12% promote hurdle. A 30% NOI miss with 100bps cap expansion (two down, two right) drops IRR to 6.1% — LP doesn't even clear their preferred return.</p>
<h2>What Practitioners Know</h2>
<ul>
<li><strong>The downside scenario tells you more than the base case.</strong> LPs care less about your projected 18% IRR and more about what happens if things go wrong. Walk them through your downside before they ask.</li>
<li><strong>Identify your "break-even" inputs.</strong> At what exit cap rate does the LP just barely hit their preferred return? At what NOI does the deal fail to service debt? These are the numbers that matter in a stress conversation.</li>
<li><strong>Scenario analysis ≠ sensitivity analysis.</strong> Sensitivity holds all else constant and varies one variable. Scenario analysis varies multiple assumptions simultaneously (e.g., a "recession scenario" with lower NOI, higher cap, and higher rates). Both are necessary — they answer different questions.</li>
</ul>
<div class="callout"><strong>Luxury Context:</strong> For Cura Blu and similar branded resort developments, sensitivity analysis must test two distinct revenue streams separately: hotel ADR/occupancy (income approach) and branded residence pricing and absorption pace. A 10% decline in residential pricing hits a different part of the capital structure than a 10% RevPAR decline — the sensitivity table for a mixed-use development should be run separately for each component.</div>`,
    quiz: [
      { q: "In a sensitivity table, LP IRR at base case is 17.5%. Exit cap expands 50bps and NOI falls 10%. IRR drops to 13.2%. What does this tell you?", opts: ["A) The deal fails — IRR is too low", "B) The deal is relatively resilient — a moderate stress still clears a 12% promote hurdle", "C) The deal is highly sensitive — this is an unacceptable stress result", "D) No conclusion can be drawn without more data"], correct: 1, exp: "13.2% IRR in a moderate stress scenario (10% NOI miss + 50bps cap expansion) still clears a typical 12% LP preferred return hurdle. This is a meaningful data point — the deal can absorb moderate stress and still deliver LP's minimum required return. The conclusion: acceptable resilience, but limited margin of safety." },
      { q: "A developer says 'our IRR is 19% in the base case.' An LP asks about the downside. What is the best response from a practitioner?", opts: ["A) Confirm the base case and move on", "B) Present a sensitivity table showing IRR across a range of NOI and exit cap scenarios", "C) Show the worst-case scenario only", "D) Explain that the base case is conservative and downside is not meaningful"], correct: 1, exp: "LPs underwrite to downside scenarios — they want to see how the deal performs across a range of outcomes, not just the most likely outcome. A sensitivity table (varying NOI and exit cap at minimum) is the professional response. Presenting only the base case signals either inexperience or that the downside looks bad." },
      { q: "What is the most impactful single variable in a hotel development exit analysis?", opts: ["A) Construction cost overrun", "B) Interest rate on the construction loan", "C) Exit cap rate", "D) Year 1 occupancy"], correct: 2, exp: "Exit cap rate typically has the largest impact on value — and therefore equity returns. A 100bps cap rate expansion on $4M NOI destroys ~$10M of value, which flows entirely to equity. Construction cost and interest rate impact the cost basis, which affects equity required, but the exit cap rate drives the enterprise value at sale — the largest single cash flow event." },
      { q: "What is the difference between sensitivity analysis and scenario analysis?", opts: ["A) They are the same technique", "B) Sensitivity varies one variable at a time; scenario analysis varies multiple variables simultaneously", "C) Sensitivity is for debt; scenario analysis is for equity", "D) Scenario analysis is only for downside; sensitivity covers upside and downside"], correct: 1, exp: "Sensitivity analysis isolates the impact of a single variable — it answers 'how much does IRR change for every 25bps of cap rate expansion?' Scenario analysis combines multiple variable changes simultaneously to model coherent real-world situations — e.g., a recession scenario with lower NOI + higher cap rates + higher debt costs all at once. Both are standard tools; they answer different questions and are complementary." }
    ]
  }
};

        "Stress-test the assumptions": `<h3>Stress Test — Rosewood Residences</h3><p><strong>Scenario 1 — 30% presale fallout:</strong> Contracted presale revenue drops from $42M to $29.4M. Remaining unsold units sell at stabilization over 18 months for $18M net (vs. $18M projected). Net residence proceeds = $47.4M vs. $60M projected. Shortfall = $12.6M. This may force a residential pricing discount or extended mezz carry — mezz balance grows another $2.5M. LP IRR drops from 20% to ~16.5%.</p><p><strong>Scenario 2 — Hotel NOI 20% below projection + 50bps cap expansion:</strong> Hotel NOI = $9.92M. Exit at 6.25% cap = $158.7M. Total project value = $158.7M + $60M residences = $218.7M. After debt payoff ($137.8M): equity = $80.9M. LP IRR drops to ~9.8% — below preferred return. GP earns no promote. Mezz lender is paid in full but barely.</p><p><strong>The intercreditor stress:</strong> If DSCR falls below 1.20x during shoulder season, the senior lender's cash sweep traps all hotel cash flow — starving the mezz lender of any current cash and forcing full reliance on the exit for mezz repayment. This is the classic mezz squeeze.</p>`,
        "Lender risk concerns": `<h3>Senior Lender Risk Analysis — $107M Construction Loan</h3><p><strong>Primary risk: Mexico cross-border complexity.</strong> The lender must navigate Mexican real estate law, ejido land issues (none here — verified clean title), and peso/dollar currency risk on construction costs. These require specialist underwriting and typically a Mexican legal opinion.</p><p><strong>Secondary risk: Mezz intercreditor.</strong> The lender must approve the $22.2M mezz structure. Key negotiated protections: (1) 90-day standstill before mezz can exercise remedies, (2) mezz purchase option at par protects senior, (3) no additional debt without senior consent.</p><p><strong>Operational risk:</strong> Rosewood management agreement — while prestigious — requires significant FF&E investment ($95K/key) and Rosewood's brand standards. Any deviation triggers cure periods that could delay completion and extend the loan.</p><p><strong>DSCR at stressed stabilization:</strong> Hotel NOI at 82% stress = $10.2M. Debt service on $107M at 8.5% IO = $9.1M. DSCR = 1.12x — below the 1.25x covenant. This is a real risk: the lender will likely require a $3M DSCR reserve holdback released only upon covenant compliance.</p>`,
        "Explain the promote structure": `<h3>Tiered Promote Structure</h3><p>The GP earns a <strong>two-tier promote</strong> above a 9% cumulative preferred return:</p><p><strong>Tier 1 (12–18% IRR): 80/20 split.</strong> Standard institutional promote. For every dollar of profit in this band, GP earns $0.20. Estimated profits in this band: ~$22M → GP promote: $4.4M.</p><p><strong>Tier 2 (above 18% IRR): 70/30 split.</strong> Stepped-up promote for exceptional performance. For every dollar of profit above the 18% hurdle, GP earns $0.30. Estimated profits: ~$16.9M → GP promote: $5.1M.</p><p><strong>Why this structure benefits both parties:</strong> The LP gives the GP more upside incentive if the deal significantly outperforms (30% vs. 20% promote) — aligning GP motivation with LP outcomes at the high end. The LP retains 70% (vs. 80%) of exceptional profits as compensation for taking the risk. </p><p><strong>Vs. a flat 80/20 structure:</strong> On this deal, a flat 80/20 would give GP 20% of all ~$38.9M above-pref profits = $7.8M. The tiered structure gives GP $9.5M ($4.4M + $5.1M) — more by $1.7M. The tiered structure rewards the GP more in outperformance scenarios, but the LP gave that up knowingly in exchange for the GP co-investing $5.8M (a meaningful check).</p>`
      }
    }
  }
};

const GLOSSARY_DATA = {
  formulas: [
    { term: "Loan-to-Cost (LTC)", def: "Measures the loan amount as a percentage of total project cost. Primary sizing metric for construction lenders.", note: "LTC = Loan Amount ÷ Total Project Cost. Typical range: 55–65% for hospitality construction." },
    { term: "Loan-to-Value (LTV)", def: "Measures the loan against the stabilized appraised value of the completed asset. The lender's exit protection metric.", note: "LTV = Loan Amount ÷ Stabilized Value. Test at both LTC and LTV — a deal can pass one and fail the other." },
    { term: "Debt Service Coverage Ratio (DSCR)", def: "Measures a property's ability to service its debt from operating income. Below 1.0x means the property cannot cover its own payments.", note: "DSCR = NOI ÷ Annual Debt Service. Most hospitality lenders require 1.25x–1.40x minimum at stabilization." },
    { term: "Net Operating Income (NOI)", def: "Property income after operating expenses, before debt service, depreciation, and income taxes. The numerator in all valuation and DSCR calculations.", note: "NOI = Effective Gross Revenue − Operating Expenses. Always clarify: is this before or after replacement reserves?" },
    { term: "Capitalization Rate (Cap Rate)", def: "The market's required yield on a stabilized real estate asset. Expresses the relationship between NOI and value.", note: "Cap Rate = NOI ÷ Value | Value = NOI ÷ Cap Rate. A 25bps cap rate move on $4M NOI changes value by ~$2.8M." },
    { term: "Internal Rate of Return (IRR)", def: "The discount rate that makes the NPV of all cash flows equal to zero. Measures time-weighted annual return on equity.", note: "IRR = the rate where: 0 = CF₀ + CF₁/(1+r)¹ + ... + CFₙ/(1+r)ⁿ. Cannot be solved algebraically — requires iteration (Excel IRR function)." },
    { term: "Equity Multiple (EM)", def: "Total distributions returned to the investor divided by total capital invested. A size measure, not a time-adjusted return.", note: "EM = Total Distributions ÷ Total Equity Invested. A 2.0x EM means you doubled your money — regardless of how long it took." },
    { term: "Cash-on-Cash Return", def: "Annual cash distributions divided by total equity invested. Measures current yield on equity, not total return.", note: "CoC = Annual Cash Distribution ÷ Total Equity Invested. Relevant for stabilized, income-producing assets. Near zero on development deals." },
    { term: "Yield on Cost (YoC)", def: "Stabilized NOI divided by total development cost. The developer's fundamental test of whether a project creates value.", note: "YoC = Stabilized NOI ÷ Total Development Cost. Must exceed market cap rate by 100–150bps+ to justify development risk." },
    { term: "Preferred Return", def: "A minimum return threshold that LPs must receive before the GP earns any promoted (disproportionate) share of profits.", note: "Pref = LP Equity × Pref Rate × Periods Unpaid (if cumulative). 8% is most common; luxury institutional deals range 7–10%." },
    { term: "Promote / Carried Interest", def: "The GP's disproportionate share of profits above the preferred return hurdle. The primary economic incentive for the development sponsor.", note: "Promote = Above-Hurdle Profits × Promote %. Typical range: 15–25%. Step-up tiers increase GP share at higher IRR hurdles." },
    { term: "Development Spread", def: "The difference between yield on cost and the market cap rate. The developer's margin for taking construction and lease-up risk.", note: "Spread = YoC − Market Cap Rate. 100–150bps is typical minimum. Tight spread (<75bps) signals marginal deal economics." }
  ],
  stack: [
    { term: "Senior Debt", def: "First-lien mortgage loan secured by the property. Has priority claim on assets and cash flows. Lowest risk, lowest return in the stack.", note: "When this lender is uncomfortable, nothing else in the deal works. Know their constraints first." },
    { term: "Mezzanine Debt", def: "Subordinate loan secured by a pledge of the ownership interests (UCC lien), not the property itself. Fills gap between senior debt and equity.", note: "Mezz foreclosure via UCC can take 30–60 days vs. 12–24 months for mortgage foreclosure — this speed differential drives mezz pricing." },
    { term: "Preferred Equity", def: "An equity ownership stake with a preferred return and priority over common equity. Sits inside the ownership structure, not as a separate debt claim.", note: "CMBS lenders often permit preferred equity where they prohibit mezz — a critical structuring distinction for permanent financing." },
    { term: "Common Equity", def: "The residual claim on all cash flows after debt service and preferred returns. Highest risk and highest potential return position in the capital stack.", note: "Common equity absorbs losses first and receives distributions last. GP co-invest and LP equity both sit here." },
    { term: "Intercreditor Agreement", def: "Contract governing the relationship between senior and mezz lenders — defining cure rights, standstill periods, purchase options, and transfer restrictions.", note: "Negotiate the intercreditor before closing the mezz, not after. A rejected intercreditor template can kill a deal at closing." },
    { term: "Interest Reserve", def: "A capitalized portion of the loan that funds interest payments during construction when the property generates no revenue.", note: "Include this in your LTC calculation. A 30-month construction loan can require $3–6M in interest reserve — a meaningful equity-equivalent cost." },
    { term: "Recourse vs. Non-Recourse", def: "A recourse loan allows the lender to pursue the borrower's personal assets beyond the property in default. Non-recourse limits recovery to the property.", note: "Construction loans are typically full recourse to the sponsor. Permanent loans are often non-recourse with 'bad boy' carve-outs." },
    { term: "Debt Service Reserve", def: "A cash reserve (funded at closing or from operations) set aside to cover debt payments if property cash flow is temporarily insufficient.", note: "Lenders require debt service reserves when DSCR is projected to be tight during lease-up. Size is typically 3–6 months of debt service." },
    { term: "PIK (Payment-In-Kind)", def: "A loan feature where interest accrues and is added to the principal balance rather than being paid in cash. Common in mezz structures.", note: "Model PIK accrual carefully — a $10M mezz at 12% PIK grows to $14.7M after 3 years. This exit obligation is often underestimated." },
    { term: "Completion Guarantee", def: "A contractual commitment from the sponsor (or its principals) to complete construction to specification and within budget, providing lender recourse if not.", note: "Required on nearly all construction loans. A sponsor with multiple projects in parallel may have difficulty satisfying multiple completion guarantees simultaneously." }
  ],
  waterfall: [
    { term: "Preferred Return", def: "The minimum annual return rate the LP must receive (on their invested capital) before the GP earns any promoted share of profits. Most commonly 8% in U.S. real estate.", note: "Example: $10M LP × 8% = $800K/year. On a 4-year development with no distributions, $3.2M accrues before any promote." },
    { term: "Cumulative Preferred Return", def: "A preferred return structure where unpaid amounts carry forward and compound. LP must receive all accrued pref before GP earns promote.", note: "In a development deal with 3 years of no distributions, a cumulative 8% pref accrues $2.4M per $10M of LP equity — which must be paid at exit before any promote." },
    { term: "Non-Cumulative Preferred Return", def: "A preferred return where unpaid amounts from prior periods are forfeited. Only current-period distributions are tested against the threshold.", note: "Non-cumulative favors the GP. In a development deal with no early distributions, the LP's pref simply doesn't accrue — making the LP's protection largely illusory." },
    { term: "Promote / Carried Interest", def: "The GP's disproportionate share of profits above the return hurdle. Typically 15–25%. The GP's primary economic incentive beyond fee income.", note: "Promote is back-end loaded — on a 5-year development, the GP may not see promote until year 6 or 7. Model the GP's all-in IRR on their co-invest + promote." },
    { term: "IRR Hurdle", def: "The minimum IRR threshold the LP must achieve before the GP earns promote at a higher tier. Creates a stepped promote structure tied to deal performance.", note: "A 12% IRR hurdle means the LP must receive capital back plus returns equivalent to a 12% annual return before the GP earns promote." },
    { term: "Catch-Up Provision", def: "After the LP's preferred return is fully paid, the catch-up allows the GP to receive a disproportionate share of distributions until they've received their full promoted percentage of all profits.", note: "A 100% GP catch-up means after the LP's pref is paid, 100% goes to GP until they've received 20% of all cumulative profits. Then distributions revert to 80/20." },
    { term: "Clawback", def: "A provision requiring the GP to return previously distributed promote if total LP returns ultimately fall below the agreed threshold. Protects LPs in deals with multiple assets or early distributions.", note: "Critical in fund structures with multiple properties. GPs should reserve against clawback risk — returning promote capital years later is a real obligation." },
    { term: "Pari Passu", def: "Latin for 'equal step.' Describes distributions made proportionally and simultaneously to multiple parties without any preference between them.", note: "In return of capital, LP and GP typically receive capital back pari passu (in proportion to their respective investments). Once the pref kicks in, they're no longer pari passu." },
    { term: "Distribution Waterfall", def: "The contractually defined sequence in which cash flows are distributed to partners. Each tier must be fully satisfied before distributions flow to the next.", note: "Standard sequence: return of capital → preferred return → catch-up → promoted split. Variations are infinite — always read the full operating agreement." },
    { term: "Return of Capital", def: "The first tier of most waterfalls — the LP and GP receive back their invested equity contributions before any profit-sharing begins.", note: "RoC is typically pro-rata (proportional to ownership). Some deals separate LP and GP capital return timing — read carefully." }
  ],
  underwriting: [
    { term: "IRR (Internal Rate of Return)", def: "The discount rate at which the NPV of all cash flows equals zero. Measures the annualized time-weighted return on equity invested in a deal.", note: "Common mistake: confusing a high IRR with a good deal. A 25% IRR on a 12-month flip and a 15% IRR on a 7-year development are fundamentally different risk profiles." },
    { term: "Equity Multiple", def: "Total distributions received by the investor divided by total equity invested. Measures the magnitude of return independent of timing.", note: "Common mistake: using EM alone without considering IRR. A 2.0x EM in 2 years (≈41% IRR) is dramatically better than 2.0x in 8 years (≈9% IRR)." },
    { term: "Cash-on-Cash Return", def: "Annual cash distributions divided by equity invested. Measures current income yield on an equity investment in a stabilized property.", note: "Common mistake: applying CoC to development deals. CoC is near zero during construction and lease-up. Use IRR and EM for development; CoC for stabilized income plays." },
    { term: "DSCR (Debt Service Coverage Ratio)", def: "NOI divided by annual debt service. Measures the property's ability to cover loan payments from operations. The lender's primary performance covenant.", note: "Common mistake: using projected NOI without applying lender stress (typically 85-90% of projection). Always model DSCR at the stressed NOI lenders will underwrite to." },
    { term: "Yield on Cost", def: "Stabilized NOI divided by total development cost. Tells the developer whether the project creates value relative to what a buyer would pay for a stabilized equivalent.", note: "Common mistake: using a comp set cap rate that doesn't match the asset's true risk profile. Using a 6% cap from a stabilized comp to validate a $4M NOI on an unproven new development overstates value creation." },
    { term: "Cap Rate", def: "The ratio of stabilized NOI to property value. Represents the market's required current yield for a given asset type, quality, and location.", note: "Common mistake: using current-year NOI (during lease-up) to value an asset rather than stabilized NOI. This systematically understates value during lease-up and overstates during periods of above-normal performance." },
    { term: "NOI (Net Operating Income)", def: "Gross revenue minus operating expenses, before debt service, depreciation, and capital expenditures. The fundamental measure of a real estate asset's income-producing capacity.", note: "Common mistake: excluding management fees or replacement reserves from operating expenses. A hotel management fee (3-5% of revenue) and replacement reserves (3-5% of revenue) can represent $500K–$1M+ annually that must be in NOI." },
    { term: "LTV (Loan-to-Value)", def: "Loan amount divided by the stabilized appraised value. Measures the lender's downside protection at maturity or exit.", note: "Common mistake: confusing LTC and LTV. LTC measures risk during construction; LTV measures risk at stabilization. A deal with conservative LTC can still have risky LTV if development costs exceed market value." },
    { term: "LTC (Loan-to-Cost)", def: "Loan amount divided by total project cost. The primary metric for sizing construction loans and determining equity required.", note: "Common mistake: excluding soft costs, interest reserves, and carry from the total project cost denominator. This overstates LTC and understates true equity requirements." },
    { term: "Sensitivity Analysis", def: "A technique for measuring how changes in a single input variable (holding all others constant) affect the output metric (IRR, EM, or DSCR).", note: "Common mistake: building sensitivity analysis only around the base case. LPs underwrite to downside scenarios. Always build a sensitivity table around the downside case as well as base." }
  ]
};

// ─── STATE ─────────────────────────────────────────────────────────────────────
let currentMod = 0;
let currentTopic = null;
let quizState = null;
let completedTopics = new Set();
let currentScenarioDiff = 'intro';
let currentScenarioType = 'hotel';
let currentScenarioLoaded = false;

// ─── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ─── MODULES & TOPICS ─────────────────────────────────────────────────────────
function selectMod(idx, btn) {
  currentMod = idx;
  document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTopics();
}

function renderTopics() {
  const mod = MODULES[currentMod];
  document.getElementById('topic-section-label').textContent = mod.label + ' — choose a topic';
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = mod.topics.map(t => {
    const isDone = completedTopics.has(t);
    const hasLesson = !!LESSONS[t];
    return `<button class="topic-btn${isDone ? ' done' : ''}" onclick="openLesson('${t.replace(/'/g, "\\'")}')" ${!hasLesson ? 'style="opacity:0.5"' : ''}>
      <span>${t}</span><span class="t-arr">→</span>
    </button>`;
  }).join('');
}

// ─── LESSONS ──────────────────────────────────────────────────────────────────
function openLesson(topic) {
  const lesson = LESSONS[topic];
  if (!lesson) return;
  currentTopic = topic;
  quizState = null;

  document.getElementById('lessons-home').style.display = 'none';
  document.getElementById('lesson-view').classList.add('active');
  document.getElementById('lesson-title').textContent = topic;
  document.getElementById('lesson-body').innerHTML = lesson.content;
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('prog-label').textContent = 'Lesson loaded';
  document.getElementById('prog-pct').textContent = 'Step 1 of 3';
  document.getElementById('prog-fill').style.width = '33%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeLesson() {
  document.getElementById('lesson-view').classList.remove('active');
  document.getElementById('lessons-home').style.display = 'block';
}

function showQuiz() {
  const lesson = LESSONS[currentTopic];
  if (!lesson) return;

  quizState = { questions: lesson.quiz, idx: 0, score: 0, answered: null, done: false };
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('prog-label').textContent = 'Quiz in progress';
  document.getElementById('prog-pct').textContent = 'Step 2 of 3';
  document.getElementById('prog-fill').style.width = '66%';
  renderQuizQuestion();
  document.getElementById('quiz-area').scrollIntoView({ behavior: 'smooth' });
}

function renderQuizQuestion() {
  const qs = quizState;
  const section = document.getElementById('quiz-section');

  if (qs.done) {
    const pct = Math.round(qs.score / qs.questions.length * 100);
    const msg = pct === 100 ? 'Perfect — exceptional.' : pct >= 75 ? 'Strong grasp.' : pct >= 50 ? 'Review the lesson and retry.' : 'Re-read the lesson before retrying.';
    section.innerHTML = `
      <div class="score-box">
        <div class="score-num">${qs.score}/${qs.questions.length}</div>
        <div class="score-msg">${pct}% — ${msg}</div>
      </div>
      <div class="action-row">
        <button class="btn-primary" onclick="retakeQuiz()">Retake quiz</button>
        <button class="btn-sec" onclick="closeLesson()">← Choose another topic</button>
      </div>`;
    document.getElementById('prog-label').textContent = 'Complete';
    document.getElementById('prog-pct').textContent = 'Step 3 of 3';
    document.getElementById('prog-fill').style.width = '100%';
    completedTopics.add(currentTopic);
    renderTopics();
    return;
  }

  const q = qs.questions[qs.idx];
  const letters = ['A','B','C','D'];
  const optsHtml = q.opts.map((opt, i) => {
    let cls = 'quiz-opt';
    if (qs.answered !== null) {
      cls += ' locked';
      if (i === q.correct) cls += ' correct';
      else if (i === qs.answered && i !== q.correct) cls += ' wrong';
    }
    return `<div class="${cls}" onclick="answerQuiz(${i})">
      <span class="opt-letter">${letters[i]}</span>
      <span>${opt.replace(/^[A-D]\)\s*/, '')}</span>
    </div>`;
  }).join('');

  const expHtml = qs.answered !== null ? `
    <div class="quiz-exp">
      <strong style="color:${qs.answered === q.correct ? 'var(--green)' : 'var(--red)'}">${qs.answered === q.correct ? '✓ Correct.' : '✗ Not quite.'}</strong>
      ${q.exp}
    </div>` : '';

  const nextHtml = qs.answered !== null ? `
    <div class="action-row" style="margin-top:12px">
      <button class="btn-primary" onclick="nextQuestion()">${qs.idx + 1 < qs.questions.length ? 'Next question →' : 'See results →'}</button>
    </div>` : '';

  section.innerHTML = `
    <div class="quiz-meta">Question ${qs.idx + 1} of ${qs.questions.length} · Score: ${qs.score}</div>
    <div class="quiz-hdr">${q.q}</div>
    <div class="quiz-opts">${optsHtml}</div>
    ${expHtml}${nextHtml}`;
}

function answerQuiz(i) {
  if (quizState.answered !== null) return;
  quizState.answered = i;
  if (i === quizState.questions[quizState.idx].correct) quizState.score++;
  renderQuizQuestion();
}

function nextQuestion() {
  quizState.idx++;
  quizState.answered = null;
  if (quizState.idx >= quizState.questions.length) quizState.done = true;
  renderQuizQuestion();
}

function retakeQuiz() {
  quizState = { questions: LESSONS[currentTopic].quiz, idx: 0, score: 0, answered: null, done: false };
  renderQuizQuestion();
}

// ─── SCENARIOS ─────────────────────────────────────────────────────────────────
function setDiff(diff, btn) {
  currentScenarioDiff = diff;
  document.querySelectorAll('.diff-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function loadScenario() {
  currentScenarioType = document.getElementById('sc-type').value;
  const scData = SCENARIOS[currentScenarioType];
  if (!scData) {
    document.getElementById('scenario-output').innerHTML = `<div class="scenario-box"><p>Scenario for this deal type coming soon. Try Hotel or Resort.</p></div>`;
    return;
  }
  const diff = currentScenarioDiff === 'senior' ? 'senior' : 'intro';
  const sc = scData[diff] || scData['intro'];
  currentScenarioLoaded = true;

  const qaKeys = Object.keys(sc.qa);
  const qaButtons = qaKeys.map(k => `<button class="qa-btn" onclick="loadScenarioQA('${currentScenarioType}','${diff}','${k.replace(/'/g, "\\'")}')">${k} →</button>`).join('');

  document.getElementById('scenario-output').innerHTML = `
    <div class="scenario-box">${sc.html}</div>
    <div class="scenario-qa">
      <div class="sec-lbl">Drill into the deal</div>
      <div class="qa-btn-grid">${qaButtons}</div>
      <div id="qa-answer-box"></div>
    </div>`;
}

function loadScenarioQA(type, diff, key) {
  const sc = SCENARIOS[type][diff] || SCENARIOS[type]['intro'];
  const answer = sc.qa[key];
  if (!answer) return;

  document.querySelectorAll('.qa-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  document.getElementById('qa-answer-box').innerHTML = `
    <div class="sec-lbl" style="margin-top:16px">${key}</div>
    <div class="qa-answer">${answer}</div>`;
  document.getElementById('qa-answer-box').scrollIntoView({ behavior: 'smooth' });
}

// ─── GLOSSARY ──────────────────────────────────────────────────────────────────
function showGloss(key) {
  document.querySelectorAll('.gloss-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.gloss-btns button').forEach(b => { b.className = 'btn-sec'; });
  document.getElementById('gloss-' + key).classList.add('active');
  event.currentTarget.className = 'btn-primary';

  const section = document.getElementById('gloss-' + key);
  if (section.innerHTML.trim() === '') {
    const items = GLOSSARY_DATA[key];
    section.innerHTML = items.map(item => `
      <div class="gloss-item">
        <div class="gloss-term">${item.term}</div>
        <div class="gloss-def">${item.def}</div>
        <div class="gloss-note">→ ${item.note}</div>
      </div>`).join('');
  }
}

// Init
renderTopics();
showGloss('formulas');
</script>
